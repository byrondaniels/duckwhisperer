name: Publish Sparkle Updates

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build signed Sparkle appcast
        env:
          PACKAGE_FORMAT: zip
          REQUIRE_SPARKLE_CONFIG: "1"
          GENERATE_SPARKLE_APPCAST: "1"
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
          SPARKLE_DOWNLOAD_URL_PREFIX: https://byrondaniels.github.io/duckwhisperer/
          SPARKLE_RELEASE_NOTES_URL_PREFIX: https://byrondaniels.github.io/duckwhisperer/
        run: ./scripts/package_release.sh

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: duckwhisperer-release
          path: |
            release/*.zip
            release/*-release-notes.md
            release/appcast.xml
            release/sparkle/*
          if-no-files-found: error

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/sparkle

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
